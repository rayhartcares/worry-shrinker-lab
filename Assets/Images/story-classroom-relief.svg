<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#FFF8F0"/>
      <stop offset="100%" stop-color="#F0EDE8"/>
    </radialGradient>
    <radialGradient id="smallCloud" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#D0D8E8"/>
      <stop offset="100%" stop-color="#B8C4D4"/>
    </radialGradient>
    <radialGradient id="skin3" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FDDBB4"/>
      <stop offset="100%" stop-color="#F5C490"/>
    </radialGradient>
    <radialGradient id="skin3b" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#F0C8A0"/>
      <stop offset="100%" stop-color="#E0A870"/>
    </radialGradient>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#C0A080" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Classroom background -->
  <rect width="400" height="400" fill="url(#bg3)" rx="20"/>

  <!-- Wall -->
  <rect x="0" y="0" width="400" height="260" fill="#F5EEE4" rx="0"/>
  <!-- Floor -->
  <rect x="0" y="260" width="400" height="140" fill="#E8D8C0" rx="0"/>
  <!-- Baseboard -->
  <rect x="0" y="258" width="400" height="10" fill="#D8C8A8"/>

  <!-- Window with sunlight -->
  <rect x="290" y="30" width="90" height="100" rx="10" fill="#B8D8F8"/>
  <rect x="290" y="30" width="90" height="100" rx="10" fill="none" stroke="#C8B890" stroke-width="5"/>
  <line x1="335" y1="30" x2="335" y2="130" stroke="#C8B890" stroke-width="3"/>
  <line x1="290" y1="80" x2="380" y2="80" stroke="#C8B890" stroke-width="3"/>
  <!-- Sun rays through window -->
  <line x1="335" y1="130" x2="285" y2="200" stroke="#FFE890" stroke-width="6" opacity="0.3"/>
  <line x1="360" y1="130" x2="340" y2="200" stroke="#FFE890" stroke-width="4" opacity="0.2"/>
  <line x1="310" y1="130" x2="230" y2="210" stroke="#FFE890" stroke-width="4" opacity="0.2"/>

  <!-- Chalkboard -->
  <rect x="20" y="30" width="230" height="120" rx="8" fill="#7AA88A"/>
  <rect x="20" y="30" width="230" height="120" rx="8" fill="none" stroke="#A08060" stroke-width="5"/>
  <!-- Chalk writing -->
  <text x="135" y="78" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#E0F0E0" opacity="0.9">Today we are</text>
  <text x="135" y="98" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#E0F0E0" opacity="0.9">brave &amp; kind!</text>
  <!-- Chalk tray -->
  <rect x="20" y="148" width="230" height="8" rx="3" fill="#C0A870"/>

  <!-- Desk 1 - Alex -->
  <rect x="90" y="268" width="110" height="18" rx="5" fill="#D8C8A0" filter="url(#shadow3)"/>
  <rect x="120" y="286" width="12" height="30" rx="4" fill="#C8B888"/>
  <rect x="158" y="286" width="12" height="30" rx="4" fill="#C8B888"/>

  <!-- Desk 2 - friend -->
  <rect x="220" y="268" width="110" height="18" rx="5" fill="#D8C8A0" filter="url(#shadow3)"/>
  <rect x="250" y="286" width="12" height="30" rx="4" fill="#C8B888"/>
  <rect x="288" y="286" width="12" height="30" rx="4" fill="#C8B888"/>

  <!-- Book on Alex's desk -->
  <rect x="110" y="254" width="40" height="18" rx="3" fill="#A8C8E8"/>
  <line x1="130" y1="254" x2="130" y2="272" stroke="#88A8C8" stroke-width="1.5"/>

  <!-- Book on friend's desk -->
  <rect x="245" y="254" width="36" height="18" rx="3" fill="#F0C8A0"/>
  <line x1="263" y1="254" x2="263" y2="272" stroke="#D0A878" stroke-width="1.5"/>

  <!-- SMALL worry cloud (shrunk, floating gently above Alex) -->
  <g transform="translate(92, 158)" opacity="0.85">
    <circle cx="26" cy="22" r="14" fill="url(#smallCloud)"/>
    <circle cx="42" cy="16" r="12" fill="url(#smallCloud)"/>
    <circle cx="57" cy="20" r="13" fill="url(#smallCloud)"/>
    <circle cx="68" cy="28" r="10" fill="url(#smallCloud)"/>
    <circle cx="16" cy="28" r="10" fill="url(#smallCloud)"/>
    <rect x="16" y="26" width="62" height="18" fill="url(#smallCloud)" rx="9"/>
    <!-- Tiny squiggle -->
    <path d="M28 30 Q34 26 40 30" stroke="#9AAABB" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Alex (smiling, seated) -->
  <!-- Legs/seated -->
  <rect x="130" y="295" width="15" height="35" rx="7" fill="#A8C4E8"/>
  <rect x="152" y="295" width="15" height="35" rx="7" fill="#A8C4E8"/>
  <!-- Shoes -->
  <ellipse cx="137" cy="330" rx="11" ry="7" fill="#7898C8"/>
  <ellipse cx="160" cy="330" rx="11" ry="7" fill="#7898C8"/>
  <!-- Body -->
  <rect x="122" y="228" width="56" height="72" rx="20" fill="#B8E0C8"/>
  <!-- Arms on desk -->
  <path d="M122 248 Q104 258 108 270" stroke="#FDDBB4" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M178 248 Q194 260 190 272" stroke="#FDDBB4" stroke-width="12" fill="none" stroke-linecap="round"/>
  <circle cx="108" cy="271" r="8" fill="#FDDBB4"/>
  <circle cx="190" cy="273" r="8" fill="#FDDBB4"/>
  <!-- Neck -->
  <rect x="141" y="214" width="18" height="18" rx="8" fill="#FDDBB4"/>
  <!-- Head -->
  <ellipse cx="150" cy="198" rx="30" ry="28" fill="url(#skin3)"/>
  <!-- Hair -->
  <path d="M123 196 Q125 168 150 165 Q175 168 177 196" fill="#7A5C40" opacity="0.9"/>
  <ellipse cx="150" cy="166" rx="26" ry="11" fill="#7A5C40" opacity="0.9"/>
  <!-- Happy eyes -->
  <path d="M141 198 Q147 193 153 198" stroke="#5A3E28" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M157 198 Q163 193 169 198" stroke="#5A3E28" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Smile -->
  <path d="M143 210 Q150 217 157 210" stroke="#C87050" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Cheeks -->
  <ellipse cx="136" cy="207" rx="8" ry="5" fill="#FFB0A0" opacity="0.45"/>
  <ellipse cx="164" cy="207" rx="8" ry="5" fill="#FFB0A0" opacity="0.45"/>

  <!-- Friend character (different skin tone, curly hair) -->
  <!-- Legs/seated -->
  <rect x="258" y="295" width="15" height="35" rx="7" fill="#F0C8A0"/>
  <rect x="280" y="295" width="15" height="35" rx="7" fill="#F0C8A0"/>
  <!-- Shoes -->
  <ellipse cx="265" cy="330" rx="11" ry="7" fill="#C09070"/>
  <ellipse cx="288" cy="330" rx="11" ry="7" fill="#C09070"/>
  <!-- Body -->
  <rect x="250" y="228" width="56" height="72" rx="20" fill="#F0C0D8"/>
  <!-- Arms -->
  <path d="M250 252 Q234 262 236 273" stroke="#F0C8A0" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M306 252 Q320 264 318 275" stroke="#F0C8A0" stroke-width="12" fill="none" stroke-linecap="round"/>
  <circle cx="236" cy="274" r="8" fill="#F0C8A0"/>
  <circle cx="318" cy="276" r="8" fill="#F0C8A0"/>
  <!-- Neck -->
  <rect x="269" y="214" width="18" height="18" rx="8" fill="url(#skin3b)"/>
  <!-- Head -->
  <ellipse cx="278" cy="198" rx="30" ry="28" fill="url(#skin3b)"/>
  <!-- Curly hair -->
  <circle cx="258" cy="198" r="12" fill="#3A2A18" opacity="0.9"/>
  <circle cx="268" cy="183" r="13" fill="#3A2A18" opacity="0.9"/>
  <circle cx="285" cy="180" r="14" fill="#3A2A18" opacity="0.9"/>
  <circle cx="300" cy="186" r="12" fill="#3A2A18" opacity="0.9"/>
  <circle cx="308" cy="198" r="11" fill="#3A2A18" opacity="0.9"/>
  <!-- Happy eyes -->
  <path d="M269 198 Q275 193 281 198" stroke="#3A2A18" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M285 198 Q291 193 297 198" stroke="#3A2A18" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Smile -->
  <path d="M271 210 Q278 217 285 210" stroke="#A06040" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Cheeks -->
  <ellipse cx="262" cy="207" rx="8" ry="5" fill="#FFB090" opacity="0.4"/>
  <ellipse cx="292" cy="207" rx="8" ry="5" fill="#FFB090" opacity="0.4"/>

  <!-- Small speech bubble / shared moment indicator -->
  <ellipse cx="210" cy="210" rx="18" ry="12" fill="#FFF0D8" opacity="0.9"/>
  <text x="210" y="214" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#C09060">✦</text>

  <!-- Label -->
  <rect x="62" y="368" width="280" height="28" rx="14" fill="white" opacity="0.65"/>
  <text x="202" y="387" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#6080A0">Making a friend — the worry shrinks!</text>
</svg>
