<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF8F0"/>
      <stop offset="100%" stop-color="#FFE8D0"/>
    </radialGradient>
    <radialGradient id="cloudGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#D0D8E8"/>
      <stop offset="100%" stop-color="#B0BCCE"/>
    </radialGradient>
    <radialGradient id="skinGrad" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FDDBB4"/>
      <stop offset="100%" stop-color="#F5C490"/>
    </radialGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#C0A080" flood-opacity="0.2"/>
    </filter>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg1)" rx="20"/>

  <!-- Soft ground -->
  <ellipse cx="200" cy="370" rx="160" ry="18" fill="#D4E8C8" opacity="0.6"/>
  <rect x="40" y="355" width="320" height="45" fill="#D4E8C8" rx="0" opacity="0.4"/>

  <!-- Tiny flowers on ground -->
  <circle cx="80" cy="358" r="5" fill="#FFCCE0"/>
  <circle cx="90" cy="356" r="3" fill="#FFE0A0"/>
  <circle cx="320" cy="360" r="4" fill="#C8E0FF"/>
  <circle cx="330" cy="358" r="3" fill="#FFCCE0"/>

  <!-- Worry cloud (large, gray, fluffy) held by Alex -->
  <g filter="url(#softShadow)" transform="translate(140, 90)">
    <!-- Cloud puffs -->
    <circle cx="60" cy="55" r="32" fill="url(#cloudGrad)" opacity="0.92"/>
    <circle cx="95" cy="45" r="28" fill="url(#cloudGrad)" opacity="0.92"/>
    <circle cx="128" cy="52" r="30" fill="url(#cloudGrad)" opacity="0.92"/>
    <circle cx="150" cy="68" r="24" fill="url(#cloudGrad)" opacity="0.92"/>
    <circle cx="35" cy="68" r="24" fill="url(#cloudGrad)" opacity="0.92"/>
    <rect x="35" y="65" width="139" height="38" fill="url(#cloudGrad)" rx="18" opacity="0.92"/>
    <!-- Sad squiggly lines on cloud -->
    <path d="M60 62 Q68 56 76 62 Q84 68 92 62" stroke="#9AAABB" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M95 60 Q103 54 111 60" stroke="#9AAABB" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="72" cy="74" r="2" fill="#9AAABB" opacity="0.6"/>
    <circle cx="100" cy="78" r="2" fill="#9AAABB" opacity="0.6"/>
    <circle cx="128" cy="74" r="2" fill="#9AAABB" opacity="0.6"/>
  </g>

  <!-- Alex body -->
  <!-- Legs -->
  <rect x="182" y="298" width="18" height="52" rx="9" fill="#A8C4E8"/>
  <rect x="206" y="298" width="18" height="52" rx="9" fill="#A8C4E8"/>
  <!-- Shoes -->
  <ellipse cx="191" cy="350" rx="14" ry="8" fill="#7898C8"/>
  <ellipse cx="215" cy="350" rx="14" ry="8" fill="#7898C8"/>
  <!-- Body / shirt -->
  <rect x="172" y="228" width="62" height="78" rx="22" fill="#B8E0C8"/>
  <!-- Arms -->
  <!-- Left arm reaching up toward cloud -->
  <path d="M172 248 Q148 238 152 200 Q154 188 164 178" stroke="#FDDBB4" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- Right arm reaching up toward cloud -->
  <path d="M234 248 Q256 238 254 205 Q253 192 244 183" stroke="#FDDBB4" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- Hands -->
  <circle cx="164" cy="177" r="10" fill="#FDDBB4"/>
  <circle cx="244" cy="182" r="10" fill="#FDDBB4"/>

  <!-- Neck -->
  <rect x="193" y="215" width="20" height="18" rx="8" fill="#FDDBB4"/>
  <!-- Head -->
  <ellipse cx="203" cy="202" rx="32" ry="30" fill="url(#skinGrad)"/>
  <!-- Hair -->
  <path d="M174 198 Q176 168 203 165 Q230 168 232 198" fill="#7A5C40" opacity="0.9"/>
  <ellipse cx="203" cy="167" rx="28" ry="12" fill="#7A5C40" opacity="0.9"/>
  <!-- Eyes - hopeful, slightly upward look -->
  <ellipse cx="193" cy="198" rx="6" ry="7" fill="white"/>
  <ellipse cx="213" cy="198" rx="6" ry="7" fill="white"/>
  <circle cx="194" cy="197" r="4" fill="#5A3E28"/>
  <circle cx="214" cy="197" r="4" fill="#5A3E28"/>
  <circle cx="195" cy="195" r="1.5" fill="white"/>
  <circle cx="215" cy="195" r="1.5" fill="white"/>
  <!-- Eyebrows - soft hopeful arch -->
  <path d="M187 190 Q193 186 199 190" stroke="#7A5C40" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M207 190 Q213 186 219 190" stroke="#7A5C40" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Mouth - gentle hopeful smile -->
  <path d="M196 210 Q203 216 210 210" stroke="#C87050" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Rosy cheeks -->
  <ellipse cx="184" cy="207" rx="7" ry="5" fill="#FFB0A0" opacity="0.4"/>
  <ellipse cx="222" cy="207" rx="7" ry="5" fill="#FFB0A0" opacity="0.4"/>

  <!-- Shirt detail -->
  <path d="M188 240 Q203 246 218 240" stroke="#90C8A8" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Title label -->
  <rect x="60" y="20" width="280" height="40" rx="20" fill="white" opacity="0.7"/>
  <text x="200" y="46" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#7090A0" font-weight="bold">Welcome to Worry Shrinker Lab</text>
</svg>
