<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="sky2" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#C8DEFF"/>
      <stop offset="100%" stop-color="#E8F4FF"/>
    </radialGradient>
    <radialGradient id="cloud2Grad" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#C8CEDD"/>
      <stop offset="100%" stop-color="#A8B0C4"/>
    </radialGradient>
    <radialGradient id="skin2" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FDDBB4"/>
      <stop offset="100%" stop-color="#F5C490"/>
    </radialGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#8090A0" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="400" height="400" fill="url(#sky2)" rx="20"/>

  <!-- Ground / path -->
  <rect x="0" y="300" width="400" height="100" fill="#C8DCA8" rx="0"/>
  <rect x="0" y="290" width="400" height="18" fill="#B8CC98" rx="0"/>
  <!-- Sidewalk path to school -->
  <rect x="150" y="292" width="100" height="108" fill="#E0D8C8" rx="0"/>

  <!-- School building -->
  <!-- Main building body -->
  <rect x="60" y="140" width="220" height="160" rx="8" fill="#E8D8C0" filter="url(#shadow2)"/>
  <!-- Roof peak -->
  <polygon points="50,140 200,80 350,140" fill="#C8A888"/>
  <!-- Roof ridge line -->
  <line x1="50" y1="140" x2="350" y2="140" stroke="#B89870" stroke-width="2"/>
  <!-- School windows -->
  <rect x="80" y="165" width="44" height="44" rx="5" fill="#B8D8F0"/>
  <rect x="80" y="165" width="44" height="44" rx="5" fill="none" stroke="#A0B8CC" stroke-width="2"/>
  <line x1="102" y1="165" x2="102" y2="209" stroke="#A0B8CC" stroke-width="1.5"/>
  <line x1="80" y1="187" x2="124" y2="187" stroke="#A0B8CC" stroke-width="1.5"/>

  <rect x="178" y="165" width="44" height="44" rx="5" fill="#B8D8F0"/>
  <rect x="178" y="165" width="44" height="44" rx="5" fill="none" stroke="#A0B8CC" stroke-width="2"/>
  <line x1="200" y1="165" x2="200" y2="209" stroke="#A0B8CC" stroke-width="1.5"/>
  <line x1="178" y1="187" x2="222" y2="187" stroke="#A0B8CC" stroke-width="1.5"/>

  <rect x="236" y="165" width="32" height="44" rx="5" fill="#B8D8F0"/>
  <rect x="236" y="165" width="32" height="44" rx="5" fill="none" stroke="#A0B8CC" stroke-width="2"/>
  <!-- Door -->
  <rect x="165" y="240" width="50" height="60" rx="6" fill="#C89870"/>
  <circle cx="208" cy="272" r="4" fill="#A07040"/>
  <!-- School sign -->
  <rect x="120" y="105" width="120" height="28" rx="6" fill="#D4C0A0"/>
  <text x="180" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#8A6840" font-weight="bold">Maplewood School</text>

  <!-- Tree left -->
  <rect x="30" y="270" width="12" height="40" rx="5" fill="#A08060"/>
  <circle cx="36" cy="258" r="26" fill="#90C878" opacity="0.9"/>
  <circle cx="22" cy="268" r="18" fill="#A0D888" opacity="0.8"/>
  <circle cx="50" cy="265" r="20" fill="#88C070" opacity="0.8"/>

  <!-- Tree right -->
  <rect x="348" y="275" width="12" height="35" rx="5" fill="#A08060"/>
  <circle cx="354" cy="263" r="22" fill="#90C878" opacity="0.9"/>

  <!-- Big worry cloud above Alex -->
  <g filter="url(#shadow2)" transform="translate(105, 38)">
    <circle cx="55" cy="55" r="30" fill="url(#cloud2Grad)" opacity="0.93"/>
    <circle cx="88" cy="44" r="26" fill="url(#cloud2Grad)" opacity="0.93"/>
    <circle cx="120" cy="50" r="28" fill="url(#cloud2Grad)" opacity="0.93"/>
    <circle cx="145" cy="65" r="22" fill="url(#cloud2Grad)" opacity="0.93"/>
    <circle cx="32" cy="66" r="22" fill="url(#cloud2Grad)" opacity="0.93"/>
    <rect x="32" y="62" width="135" height="36" fill="url(#cloud2Grad)" rx="16" opacity="0.93"/>
    <!-- Nervous swirls -->
    <path d="M58 63 Q66 55 74 63 Q82 71 90 63" stroke="#8090A4" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M98 58 Q106 52 114 58" stroke="#8090A4" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="70" cy="74" r="2.5" fill="#8090A4" opacity="0.5"/>
    <circle cx="100" cy="78" r="2.5" fill="#8090A4" opacity="0.5"/>
    <circle cx="126" cy="73" r="2.5" fill="#8090A4" opacity="0.5"/>
  </g>

  <!-- Dotted line from cloud to Alex's head -->
  <line x1="200" y1="145" x2="200" y2="178" stroke="#A0AABE" stroke-width="2" stroke-dasharray="4,4" opacity="0.6"/>

  <!-- Alex body (nervous posture - slightly hunched) -->
  <!-- Legs -->
  <rect x="184" y="300" width="16" height="48" rx="8" fill="#A8C4E8"/>
  <rect x="206" y="300" width="16" height="48" rx="8" fill="#A8C4E8"/>
  <!-- Shoes -->
  <ellipse cx="192" cy="348" rx="13" ry="7" fill="#7898C8"/>
  <ellipse cx="214" cy="348" rx="13" ry="7" fill="#7898C8"/>
  <!-- Body -->
  <rect x="175" y="234" width="58" height="72" rx="20" fill="#F0C8A0"/>
  <!-- Arms (tensed inward, nervous) -->
  <path d="M175 250 Q155 265 160 282" stroke="#FDDBB4" stroke-width="13" fill="none" stroke-linecap="round"/>
  <path d="M233 250 Q253 265 248 282" stroke="#FDDBB4" stroke-width="13" fill="none" stroke-linecap="round"/>
  <!-- Hands -->
  <circle cx="160" cy="284" r="9" fill="#FDDBB4"/>
  <circle cx="248" cy="284" r="9" fill="#FDDBB4"/>
  <!-- Neck -->
  <rect x="194" y="220" width="18" height="18" rx="8" fill="#FDDBB4"/>
  <!-- Head (slightly tilted) -->
  <ellipse cx="203" cy="204" rx="30" ry="28" fill="url(#skin2)"/>
  <!-- Hair -->
  <path d="M176 202 Q178 173 203 170 Q228 173 230 202" fill="#7A5C40" opacity="0.9"/>
  <ellipse cx="203" cy="171" rx="26" ry="11" fill="#7A5C40" opacity="0.9"/>
  <!-- Nervous eyes - wide -->
  <ellipse cx="193" cy="202" rx="6" ry="7" fill="white"/>
  <ellipse cx="213" cy="202" rx="6" ry="7" fill="white"/>
  <circle cx="193" cy="203" r="4.5" fill="#5A3E28"/>
  <circle cx="213" cy="203" r="4.5" fill="#5A3E28"/>
  <circle cx="194" cy="200" r="1.5" fill="white"/>
  <circle cx="214" cy="200" r="1.5" fill="white"/>
  <!-- Eyebrows - worried, raised in middle -->
  <path d="M187 192 Q190 188 196 193" stroke="#7A5C40" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M210 193 Q216 188 219 192" stroke="#7A5C40" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Nervous mouth - slight frown -->
  <path d="M196 215 Q203 211 210 215" stroke="#C87050" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Rosy cheeks -->
  <ellipse cx="184" cy="211" rx="6" ry="4" fill="#FFB0A0" opacity="0.35"/>
  <ellipse cx="222" cy="211" rx="6" ry="4" fill="#FFB0A0" opacity="0.35"/>

  <!-- Small sweat bead -->
  <ellipse cx="228" cy="196" rx="3" ry="5" fill="#B8D8F0" opacity="0.7"/>

  <!-- Label -->
  <rect x="82" y="368" width="240" height="28" rx="14" fill="white" opacity="0.65"/>
  <text x="202" y="387" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#6080A0">Alex feels nervous at school</text>
</svg>
